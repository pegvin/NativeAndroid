name: Build
on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04

    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Deps (Linux)
      if: ${{ matrix.os == 'ubuntu-22.04' }}
      run: |
        sudo apt-get update -y
        sudo apt-get install make wget unzip -y

    # Could've installed openjdk-17-headless, But it seems like
    # the runners have some old version of openjdk pre-installed
    # which causes conflicts
    - uses: actions/setup-java@v4
      with:
        distribution: "jetbrains"
        java-version: "17"

    - name: Setup Android SDK
      run: |
        chmod +x ./setup_android.sh
        mkdir sdk/
        cd sdk/
        ../setup_android.sh

    - name: Build
      run: |
        make all ANDROID_SDK=$(realpath ./sdk/) BUILD_TOOLS_VER=36.0.0 NDK_VER=27.2.12479018

    - name: Upload Artifacts (Linux)
      if: ${{ matrix.os == 'ubuntu-22.04' }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.os }}
        if-no-files-found: error
        path: ./build/
